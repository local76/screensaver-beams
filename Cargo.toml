[package]
name = "beams"
version = "2026.7.0"
edition = "2021"
description = "beams - retro terminal screensaver effect"
autobins = false

[[bin]]
name = "beams"
path = "src/main.rs"

[dependencies]
library = { git = "https://github.com/local76/library.git", branch = "main" }

[build-dependencies]
library = { git = "https://github.com/local76/library.git", branch = "main" }
embed-resource = "2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[patch."https://github.com/local76/library.git"]
library = { path = "../library" }

[package.metadata.deb]
name = "scene-beams"
maintainer = "Screensavers Developer <dev@local76.org>"
extended-description = "Screensaver effect (beams) part of the screensavers collection."
depends = "libc6, xterm"
section = "utils"
priority = "optional"
assets = [
    ["target/release/beams", "usr/libexec/screensaver-shims/beams", "755"],
    ["assets/scene-beams.desktop", "usr/share/applications/scene-beams.desktop", "644"],
    ["assets/scene-beams.xml", "usr/share/xscreensaver/config/scene-beams.xml", "644"]
]

[package.metadata.generate-rpm]
name = "scene-beams"
version = "2026.7.0"
release = "1"
arch = "x86_64"
summary = "beams - retro terminal screensaver effect"
description = "Screensaver effect (beams) part of the screensavers collection."
license = "MIT"
assets = [
    { source = "target/release/beams", dest = "/usr/libexec/screensaver-shims/beams", mode = "755" },
    { source = "assets/scene-beams.desktop", dest = "/usr/share/applications/scene-beams.desktop", mode = "644" },
    { source = "assets/scene-beams.xml", dest = "/usr/share/xscreensaver/config/scene-beams.xml", mode = "644" }
]

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_System_Console", "Win32_Foundation"] }

